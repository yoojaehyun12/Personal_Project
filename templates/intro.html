<!DOCTYPE html>
<html>
    <head>
        <title>BlendBot-Zero</title>
        <link href="/static/bootstrap4/css/bootstrap.min.css" rel="stylesheet" type="text/css">
        <style>
            .menu-card {
                transition: transform 0.2s;
                border-radius: 15px;
            }
            .menu-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            }
            /* 타이틀 반응형 크기 조절 */
            .responsive-title {
                font-size: 6vw; /* 기본적으로 화면 너비의 6% 크기로 설정 (부드럽게 커지고 작아짐) */
                font-weight: 900;
                letter-spacing: -0.05em;
            }

            /* PC 화면처럼 엄청 넓어질 때 글씨가 무한정 커지는 걸 방지 */
            @media (min-width: 1200px) {
                .responsive-title {
                    font-size: 72px; 
                }
            }

            /* 모바일 화면처럼 좁아졌을 때 글씨가 너무 작아지는 걸 방지 */
            @media (max-width: 768px) {
                .responsive-title {
                    font-size: 36px; 
                }
            }
        </style>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <a class="navbar-brand" href="/">BlendBot-Zero</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item active mx-5">
                    <a class="nav-link" href="/">메인<span class="sr-only">(current)</span></a>
                </li>
                <li class="nav-item active mx-5">
                    <a class="nav-link" href="/intro">소개<span class="sr-only">(current)</span></a>
                </li>
                <li class="nav-item active mx-5">
                    <a class="nav-link" href="/bar_list">칵테일</a>
                </li>
                <li class="nav-item active mx-5">
                    <a class="nav-link" href="/gita">문의<span class="sr-only">(current)</span></a>
                </li>
            </ul>
                <form class="form-inline my-2 my-lg-0">
                    <input class="form-control mr-sm-2" type="search" placeholder="Search" aria-label="Search">
                        <button class="btn btn-outline-success my-2 my-sm-0" type="submit">Search</button>
                </form>
        </div>
        </nav>

        <div class="container text-center mt-5">
            <h2 class="responsive-title">BlendBot-Zero</h2>
        </div>

        <div class="container mt-5 mb-5">
            <div class="row">
                <div class="col-md-6 mb-4">
                    <div class="card menu-card h-100 shadow-sm border-0 bg-light">
                        <div class="card-body p-5">
                            <h2 class="card-title text-center font-weight-bold mb-4">추천 세팅</h2>
                            <p class="text-muted text-center mb-4">로봇이 완벽한 비율로 제조하는 시그니처 메뉴입니다.</p>
                            
                            <div class="list-group mb-4">
                                <label class="list-group-item list-group-item-action">
                                    <input class="mr-2" type="radio" name="recommendItem" value="sunrise"> 
                                    1. 상큼 폭발 썬라이즈 (오렌지+석류)
                                </label>
                                <label class="list-group-item list-group-item-action">
                                    <input class="mr-2" type="radio" name="recommendItem" value="refresh"> 
                                    2. 제로 칼로리 리프레셔 (라임+탄산수)
                                </label>
                                <label class="list-group-item list-group-item-action">
                                    <input class="mr-2" type="radio" name="recommendItem" value="einspanner"> 
                                    3. 몽글몽글 아인슈페너 폼 모히토
                                </label>
                            </div>
                            
                            <div class="text-center">
                                <button class="btn btn-dark btn-lg px-5" onclick="goNextWithRecommend()">선택 완료</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-6 mb-4">
                    <div class="card menu-card h-100 shadow-sm border-0 bg-light">
                        <div class="card-body p-5 d-flex flex-column justify-content-center">
                            <h2 class="card-title text-center font-weight-bold mb-4">커스텀 세팅</h2>
                            <p class="text-center mb-5 text-muted" style="line-height: 1.8;">
                                술잘알을 위한 특별한 공간!<br>
                                베이스 음료부터 시럽, 가니쉬까지<br>
                                원하는 재료를 직접 골라<br>
                                나만의 완벽한 목테일을 설계해 보세요.
                            </p>
                            
                            <div class="text-center mt-auto">
                                <a href="/bar_list" class="btn btn-outline-dark btn-lg px-5">직접 만들기</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            function goNextWithRecommend() {
                const selectedMenu = document.querySelector('input[name="recommendItem"]:checked');
                if (selectedMenu) {
                    // 🌟 수정됨: .html 확장자 제거
                    window.location.href = "/bar_list?menu=" + selectedMenu.value;
                } else {
                    alert("추천 메뉴를 먼저 하나 선택해 주세요!");
                }
            }
        </script>

        <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.min.js" integrity="sha384-w1Q4orYjBQndcko6MimVbzY0tgp4pWB4lZ7lr30WKz0vr/aWKhXdBNmNb5D92v7s" crossorigin="anonymous"></script>
    </body>
</html>
